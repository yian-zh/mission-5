# Custom PostgreSQL configuration for pgBadger logging

# Connection Settings
listen_addresses = '*'

# Logging Configuration
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql.log'  # Fix the filename to make it easier to find
log_file_mode = 0644
log_rotation_age = 1d
log_rotation_size = 10MB

# Enable logging of all statements (set to 0 for tracking all queries in pgBadger)
log_min_duration_statement = 0

# pgBadger recommended log line prefix
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# What to log
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
log_error_verbosity = default

# Localization/Formatting
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
